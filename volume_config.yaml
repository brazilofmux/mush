title: The MUSH Book Series
subtitle: Standards and Practice for Multi-User Shared Hallucination Servers
author: Stephen Dennis
description: A comprehensive multi-volume reference covering the MUSH server standard and practical usage.
publisher: ''
copyright_year: '2026'

volumes:
  - volume_number: 1
    title: "The MUSH Standard"
    subtitle: "A Formal Specification for Multi-User Shared Hallucination Servers"
    description: "The first formal standard for MUSH servers, defining the object model, command language, evaluation engine, built-in functions, flags, permissions, and networking behavior that conforming implementations must support."
    include_files:
      # Front Matter
      - 1-00-00-*.md       # Volume 1 Introduction
      # Part I: Scope, Conformance, and Foundations
      - 1-01-*.md           # Scope and Purpose
      - 1-02-*.md           # Conformance and Terminology
      - 1-03-*.md           # Notational Conventions
      # Part II: The Object Model
      - 1-04-*.md           # Objects and Dbrefs
      - 1-05-*.md           # Object Types
      - 1-06-*.md           # Attributes
      - 1-07-*.md           # Flags and Toggles
      - 1-08-*.md           # Powers
      # Part III: Command Processing
      - 1-09-*.md           # Command Parsing and Dispatch
      - 1-10-*.md           # Name Matching and Resolution
      - 1-11-*.md           # Action Lists and Queuing
      # Part IV: The Evaluation Engine
      - 1-12-*.md           # Expression Evaluation
      - 1-13-*.md           # Substitution and Percent-Codes
      - 1-14-*.md           # Functions — Overview and Calling Convention
      # Part V: Built-in Commands
      - 1-15-*.md           # Movement and Look
      - 1-16-*.md           # Communication Commands
      - 1-17-*.md           # Building Commands
      - 1-18-*.md           # Object Manipulation
      - 1-19-*.md           # Administration Commands
      # Part VI: Built-in Functions
      - 1-20-*.md           # String Functions
      - 1-21-*.md           # Math and Logic Functions
      - 1-22-*.md           # List Functions
      - 1-23-*.md           # Object and Database Functions
      - 1-24-*.md           # Boolean and Comparison Functions
      - 1-25-*.md           # Side-Effect Functions
      - 1-26-*.md           # Miscellaneous Functions
      # Part VII: Security and Permissions
      - 1-27-*.md           # Locks
      - 1-28-*.md           # Permission Model
      - 1-29-*.md           # Zones and Control
      # Part VIII: Systems
      - 1-30-*.md           # The Communication System (Channels)
      - 1-31-*.md           # The Mail System
      - 1-32-*.md           # Networking and Connections
      - 1-33-*.md           # Database Persistence
      # Part IX: Conformance and Extensions
      - 1-34-*.md           # Conformance Levels
      - 1-35-*.md           # Optional Features
      - 1-36-*.md           # Implementation-Defined Behavior
      - 1-37-*.md           # Reserved Names and Future Directions
    output_name: "Volume_1_The_MUSH_Standard"

  - volume_number: 2
    title: "The MUSH User's Manual"
    subtitle: "A Complete Guide to Using Multi-User Shared Hallucination Servers"
    description: "A comprehensive user's guide covering everything from connecting to a MUSH for the first time through advanced softcode programming and server administration."
    include_files:
      # Front Matter
      - 2-00-00-*.md       # Volume 2 Introduction
      # Part I: Getting Started
      - 2-01-*.md           # What Is a MUSH?
      - 2-02-*.md           # Connecting and First Steps
      - 2-03-*.md           # Communicating
      - 2-04-*.md           # Getting Around
      # Part II: Building Your World
      - 2-05-*.md           # Creating Rooms and Exits
      - 2-06-*.md           # Creating Things and Players
      - 2-07-*.md           # Describing Your Creations
      - 2-08-*.md           # Attributes and Properties
      - 2-09-*.md           # Locks and Security
      # Part III: MUSHcode Programming
      - 2-10-*.md           # Your First MUSHcode
      - 2-11-*.md           # Variables and Data Types
      - 2-12-*.md           # Control Flow
      - 2-13-*.md           # String Manipulation
      - 2-14-*.md           # Lists and Iteration
      - 2-15-*.md           # User-Defined Commands and Functions
      - 2-16-*.md           # Advanced Programming Patterns
      - 2-16a-*.md          # Modern Features (JSON, SQL, WebSockets, GMCP)
      - 2-16b-*.md          # Scheduled Tasks (@cron)
      # Part IV: Community and Communication
      - 2-17-*.md           # Channels
      - 2-18-*.md           # The Mail System
      - 2-19-*.md           # Bulletin Board Systems
      # Part V: Administration
      - 2-20-*.md           # Running a MUSH Server
      - 2-21-*.md           # Player Management
      - 2-22-*.md           # Database Maintenance
      - 2-23-*.md           # Security and Hardening
      # Part VI: Reference
      - 2-24-*.md           # Quick Reference Card
      - 2-25-*.md           # Troubleshooting
    output_name: "Volume_2_The_MUSH_Users_Manual"

# General settings
output_format: both
base_output_dir: book_output
cover_image_prefix: cover_vol

# PDF output profiles
pdf_profile: trade

pdf_profiles:
  trade:
    description: "6x9 inch trade paperback"
    papersize: "{6in,9in}"
    inner: 0.75in
    outer: 0.5in
    top: 0.5in
    bottom: 0.75in
    footskip: 0.5in
    fontsize: 10pt
    documentclass: book
    classoption: openright
  binder:
    description: "US Letter for 3-ring binder"
    papersize: letterpaper
    inner: 1.25in
    outer: 0.75in
    top: 0.75in
    bottom: 0.75in
    footskip: 0.5in
    fontsize: 11pt
    documentclass: report
    classoption: twoside
